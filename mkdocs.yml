site_name: IRStart
site_description: Documentación técnica del sistema de arranque por infrarrojos — multi-protocolo RC5/NEC/SIRC para competiciones de robótica
site_author: robotaleh
site_url: https://docs.oprobots.org/modules/IRStart
repo_name: OPRobots/IRStart

theme:
  name: material
  custom_dir: docs/assets/templates
  language: es
  font:
    text: Roboto
    code: Roboto Mono
  palette:
    - scheme: default
      primary: white
      accent: custom
      toggle:
        icon: material/weather-night
        name: Modo oscuro
    - scheme: slate
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Modo claro
  features:
    - navigation.instant
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy
  logo: assets/imgs/opr_logo.png
  favicon: assets/imgs/favicon/favicon.ico
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - assets/js/mermaid-zoom.js

extra_css:
  - assets/css/custom.css
  - assets/css/mermaid-zoom.css

exclude_docs: |
  README.md

validation:
  links:
    not_found: ignore

nav:
  - Inicio: index.md
  - Hardware: 01-hardware.md
  - Arquitectura Software: 02-software-architecture.md
  - Protocolos IR: 03-ir-protocols.md
  - Menú: 04-menu-system.md
  - Debug: 05-debug-system.md
  - EEPROM: 06-storage.md
  - Problemas Conocidos: 07-known-issues.md
